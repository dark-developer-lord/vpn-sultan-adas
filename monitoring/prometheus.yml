# Prometheus Configuration for VPN Service

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'vpn-service-monitor'
    environment: 'production'

# Alertmanager config
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules for alerts
rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  # VPN Backend API metrics
  - job_name: 'vpn-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['vpn-api:3000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # PostgreSQL metrics (via postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['vpn-postgres-exporter:9187']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'pg_.*'
        action: keep

  # Redis metrics (via redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['vpn-redis-exporter:9121']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'redis_.*'
        action: keep

  # Loki (log aggregation)
  - job_name: 'loki'
    static_configs:
      - targets: ['vpn-loki:3100']

  # AlertManager (alert monitoring)
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['vpn-alertmanager:9093']
      - source_labels: [__meta_consul_service_id]
        target_label: instance

remote_write:
  # Optional: Send metrics to remote storage (e.g., Prometheus Cloud)
  - url: 'http://remote-storage:9009/api/v1/write'
    write_relabel_configs:
      - source_labels: [__name__]
        regex: '(rate|histogram|counter).*'
        action: keep
    queue_config:
      capacity: 1000
      max_shards: 5
      min_shards: 1
