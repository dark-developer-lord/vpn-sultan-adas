# Prometheus Configuration for VPN Service

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'vpn-service-monitor'
    environment: 'production'

# Alertmanager config
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules for alerts
rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend API metrics
  - job_name: 'vpn-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Backend instance 2 (if scaled)
  - job_name: 'vpn-backend-2'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8081']

  # PostgreSQL metrics (via postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['localhost:9187']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'pg_.*'
        action: keep

  # Redis metrics (via redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:9121']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'redis_.*'
        action: keep

  # Node Exporter (server metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          alias: 'api-server'
    relabel_configs:
      - source_labels: [__address__]
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}:9100'
        target_label: __address__

  # Docker container metrics (via cAdvisor)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['localhost:8080']
    metrics_path: '/metrics'

  # Nginx metrics (via nginx_exporter)
  - job_name: 'nginx'
    static_configs:
      - targets: ['localhost:9113']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'nginx_.*'
        action: keep

  # Application logs and events via Loki
  - job_name: 'loki'
    static_configs:
      - targets: ['localhost:3100']

  # Service discovery for dynamic targets (Consul)
  - job_name: 'consul-services'
    consul_sd_configs:
      - server: 'localhost:8500'
    relabel_configs:
      - source_labels: [__meta_consul_service]
        target_label: job
      - source_labels: [__meta_consul_node]
        target_label: node
      - source_labels: [__meta_consul_service_id]
        target_label: instance

remote_write:
  # Optional: Send metrics to remote storage (e.g., Prometheus Cloud)
  - url: 'http://remote-storage:9009/api/v1/write'
    write_relabel_configs:
      - source_labels: [__name__]
        regex: '(rate|histogram|counter).*'
        action: keep
    queue_config:
      capacity: 1000
      max_shards: 5
      min_shards: 1
