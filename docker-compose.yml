services:
  postgres:
    image: postgres:15-alpine
    container_name: vpn-postgres
    environment:
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: vpn
      POSTGRES_DB: vpn_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vpn-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@vpn.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: vpn-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://vpn:vpn@postgres:5432/vpn_service
      JWT_SECRET: dev-secret-key-change-in-production
      MASTER_KEY: dev-master-key-00000000000000000000000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
