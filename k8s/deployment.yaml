---
# Kubernetes Deployment Configuration for VPN Service
# Usage: kubectl apply -f k8s-deployment.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: vpn-service

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: vpn-api-config
  namespace: vpn-service
data:
  DATABASE_URL: "postgresql://vpn_user:${DB_PASSWORD}@postgres:5432/vpn_db"
  REDIS_URL: "redis://redis:6379"
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"

---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: vpn-secrets
  namespace: vpn-service
type: Opaque
stringData:
  jwt_secret: "${JWT_SECRET}"
  db_password: "${DB_PASSWORD}"
  stripe_key: "${STRIPE_KEY}"
  stripe_webhook_secret: "${STRIPE_WEBHOOK_SECRET}"

---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: vpn-service
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          value: "vpn_user"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vpn-secrets
              key: db_password
        - name: POSTGRES_DB
          value: "vpn_db"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U vpn_user
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U vpn_user
          initialDelaySeconds: 5
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "default"
      resources:
        requests:
          storage: 10Gi

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: vpn-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: redis-storage
          mountPath: /data
      volumes:
      - name: redis-storage
        emptyDir: {}

---
# Service for Redis
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: vpn-service
spec:
  ports:
  - port: 6379
  selector:
    app: redis

---
# Service for PostgreSQL
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: vpn-service
spec:
  clusterIP: None
  ports:
  - port: 5432
  selector:
    app: postgres

---
# VPN API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpn-api
  namespace: vpn-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vpn-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: vpn-api
    spec:
      serviceAccountName: vpn-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: vpn-api
        image: vpn-service/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: metrics
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: vpn-api-config
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: vpn-api-config
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: vpn-secrets
              key: jwt_secret
        - name: STRIPE_API_KEY
          valueFrom:
            secretKeyRef:
              name: vpn-secrets
              key: stripe_key
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: vpn-api-config
              key: LOG_LEVEL
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}

---
# Service for VPN API
apiVersion: v1
kind: Service
metadata:
  name: vpn-api
  namespace: vpn-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: vpn-api

---
# Horizontal Pod Autoscaler for API
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vpn-api-hpa
  namespace: vpn-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vpn-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# ServiceAccount for VPN API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vpn-api
  namespace: vpn-service

---
# Role for VPN API
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vpn-api
  namespace: vpn-service
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]

---
# RoleBinding for VPN API
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vpn-api
  namespace: vpn-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vpn-api
subjects:
- kind: ServiceAccount
  name: vpn-api
  namespace: vpn-service

---
# NetworkPolicy for VPN Service namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vpn-service-netpolicy
  namespace: vpn-service
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: vpn-service
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: vpn-service
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
  - to:
    - podSelector:
        matchLabels:
          k8s-app: kube-dns
  - ports:
    - protocol: TCP
      port: 53

---
# PodDisruptionBudget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vpn-api-pdb
  namespace: vpn-service
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: vpn-api

---
# Ingress Configuration
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vpn-service-ingress
  namespace: vpn-service
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.vpn-service.com
    secretName: vpn-service-tls
  rules:
  - host: api.vpn-service.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vpn-api
            port:
              number: 80

---
# Certificate for TLS (using cert-manager)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vpn-service-tls
  namespace: vpn-service
spec:
  secretName: vpn-service-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - api.vpn-service.com

---
# Resource Quota for namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: vpn-service-quota
  namespace: vpn-service
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    pods: "100"

---
# Network Policy for deny all ingress by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: vpn-service
spec:
  podSelector: {}
  policyTypes:
  - Ingress

---
# Network Policy allowing LoadBalancer traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-loadbalancer
  namespace: vpn-service
spec:
  podSelector:
    matchLabels:
      app: vpn-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090
